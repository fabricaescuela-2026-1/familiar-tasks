spring.application.name=authentication-acceptance
spring.main.allow-bean-definition-overriding=true

# H2 en memoria con esquema "auth" precreado y modo PostgreSQL
spring.datasource.url=jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Schema gestionado por schema-h2.sql para reproducir el modelo prod (sin UNIQUE implícito en tokens.user_id)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Azure Storage Queue - cadenas de conexión Azurite válidas
