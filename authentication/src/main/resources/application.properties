spring.application.name=authentication

# User queue configuration
azure.storage.users.connection-string=${CONNECTION_STRING}
azure.storage.users.queue-name=${QUEUE_NAME}

# task users queue 
azure.storage.users-task.connection-string=${TASK_USERS_CONNECTION_STRING}
azure.storage.users-task.queue-name=${TASK_USERS_CONNECTION_STRING}

# DataSource Configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://loaclhost:5432/fabrica}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:10293}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# token expiration time 
jwt.access.expiration=3600000
jwt.refresh.expiration=604800000
jwt.secret=${JWT_SECRET_KEY}