spring.application.name=authentication

spring.config.import=optional:file:.env[.properties]

# User queue configuration
azure.storage.connection-string=${AZURE_CONNECTION_STRING}
azure.storage.memebership-service.queue-name=${MEMBERSHIP_SERVICE_QUEUE_NAME}
azure.storage.tasks-service.queue-name=${TASKS_SERVICE_QUEUE_NAME}

# DataSource Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.show-sql=false

# THIS IS THE KEY — only generate the script, never execute it
spring.jpa.hibernate.ddl-auto=update

# token expiration time
jwt.access.expiration=3600000
jwt.refresh.expiration=604800000
jwt.secret=${JWT_SECRET_KEY}


# Email Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_SENDER}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
