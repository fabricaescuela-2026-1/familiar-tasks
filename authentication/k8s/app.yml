apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  # Datasource
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
  SPRING_DATASOURCE_USERNAME: sa
  SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver

  # JPA
  SPRING_JPA_HIBERNATE_DDL_AUTO: update
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect

  # JWT expirations (no sensibles)
  JWT_ACCESS_EXPIRATION: "3600000"
  JWT_REFRESH_EXPIRATION: "604800000"

  # Azure Queue names
  AZURE_STORAGE_USERS_QUEUE_NAME: authentication
  AZURE_STORAGE_USERS_TASK_QUEUE_NAME: users-task

  # Logging
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: WARN
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: WARN
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN
  LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN
  LOGGING_LEVEL_COM_FABRICA: INFO
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-app
  labels:
    app: authentication-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentication-app
  template:
    metadata:
      labels:
        app: authentication-app
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Esperando a PostgreSQL...";
                sleep 2;
              done;
              echo "PostgreSQL listo."
      containers:
        - name: authentication-app
          image: localhost:5001/authentication:latest # <- cambia por tu imagen local
          imagePullPolicy: Always # usa la imagen local (importante para minikube/kind)
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          env:
            # Datasource
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: db-password

            # JWT
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret

            # Email
            - name: EMAIL_SENDER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: email-sender
            - name: EMAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: email-password

            # Azure Storage
            - name: MEMBERSHIP_SERVICE_QUEUE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: membership-service-queue-name

            - name: TASKS_SERVICE_QUEUE_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: tasks-service-queue-name

            - name: AZURE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: azure-connection-string

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: authentication-app
  labels:
    app: authentication-app
spec:
  type: ClusterIP
  selector:
    app: authentication-app
  ports:
    - port: 8081
      targetPort: 8081
