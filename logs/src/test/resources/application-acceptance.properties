spring.application.name=logs-acceptance
spring.main.allow-bean-definition-overriding=true

# Excluir auto-config de Mongo: usamos un LogRepositoryPort en memoria via AcceptanceTestConfig
spring.autoconfigure.exclude=\
  org.springframework.boot.mongodb.autoconfigure.MongoAutoConfiguration,\
  org.springframework.boot.mongodb.autoconfigure.MongoReactiveAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoRepositoriesAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveAutoConfiguration,\
  org.springframework.boot.data.mongodb.autoconfigure.DataMongoReactiveRepositoriesAutoConfiguration

# Azure Service Bus — LogMessageListener queda excluido por @Profile("!acceptance")
spring.jms.servicebus.connection-string=Endpoint=sb://fake.servicebus.windows.net/;SharedAccessKeyName=root;SharedAccessKey=ZmFrZWtleQ==
spring.jms.servicebus.idle-timeout=30000

logging.level.org.springframework.web=WARN
logging.level.org.springframework=WARN
logging.level.com.fabricaescuela=INFO
