apiVersion: apps/v1
kind: Deployment
metadata:
  name: member-home
  labels:
    app: member-home
spec:
  replicas: 1
  selector:
    matchLabels:
      app: member-home
  template:
    metadata:
      labels:
        app: member-home
    spec:
      containers:
        - name: member-home
          image: localhost:5001/member-home:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              value: "jdbc:postgresql://fabrica-escuela.postgres.database.azure.com:5432/identify_service?currentSchema=users"
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: member-secrets
                  key: db-username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: member-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: member-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: "http://authentication:8080"
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: member-secrets
                  key: azure-storage-connection-string
            - name: AUDIT_LOG_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: member-secrets
                  key: audit-log-connection-string
            - name: AUDIT_LOG_QUEUE_NAME
              value: "audit-log"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: member-home
spec:
  type: LoadBalancer
  selector:
    app: member-home
  ports:
    - port: 8080
      targetPort: 8080