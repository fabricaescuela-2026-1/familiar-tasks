spring.application.name=user-membership-service

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.default_schema=Users
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT shared with authentication service
jwt.secret=${JWT_SECRET}
jwt.expiration.time=86400000

# Azure Storage Queue (publicada por el servicio authentication)
spring.storage.queue.connection-string=${AZURE_STORAGE_CONNECTION_STRING}
spring.storage.queue.name=authentication

# Authentication service for token refresh
auth.service.url=${AUTH_SERVICE_URL}

# Azure Service Bus para logs de auditoria
audit.log.servicebus.connection-string=${AUDIT_LOG_CONNECTION_STRING}
audit.log.servicebus.queue-name=${AUDIT_LOG_QUEUE_NAME}
