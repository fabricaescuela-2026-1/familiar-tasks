spring.application.name=tasks-acceptance
spring.main.allow-bean-definition-overriding=true

# H2 en memoria con schema "task_management" precreado y modo PostgreSQL.
# DATABASE_TO_LOWER + CASE_INSENSITIVE_IDENTIFIERS reconcilian el casing
# entre @Entity(name="guests") y @Table(name="tasks") con el schema lower.
spring.datasource.url=jdbc:h2:mem:tasksdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_schema=task_management

# JWT — clave de test (>= 32 bytes para HS256)
jwt.secret=clave-secreta-de-pruebas-para-cucumber-1234567890
jwt.expiration.time=86400000

# User membership service — UserValidationPort está mockeado
user.validation.service.url=http://localhost:0

# Azure Storage Queue (registro de usuarios) — UserRegistrationMessageListener está mockeado
spring.storage.queue.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;QueueEndpoint=http://127.0.0.1:10001/devstoreaccount1;
spring.storage.queue.name=users-task

# Authentication service para refresh — AuthClient está mockeado
auth.service.url=http://localhost:0

# Azure Service Bus para audit logs — ServiceBusSenderClient está mockeado
audit.log.servicebus.connection-string=Endpoint=sb://fake.servicebus.windows.net/;SharedAccessKeyName=root;SharedAccessKey=ZmFrZWtleQ==;EntityPath=audit
audit.log.servicebus.queue-name=audit

logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.fabricaescuela=INFO
