apiVersion: apps/v1
kind: Deployment
metadata:
  name: tasks
  labels:
    app: tasks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tasks
  template:
    metadata:
      labels:
        app: tasks
    spec:
      containers:
        - name: tasks
          image: localhost:5001/tasks:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              value: "jdbc:postgresql://dpg-d7s7ohog4nts73d5o1qg-a.virginia-postgres.render.com:5432/fabrica_escuela?sslmode=require&currentSchema=task_management"
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: db-username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: db-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: jwt-secret
            - name: AUTH_SERVICE_URL
              value: "http://authentication:8082"
            - name: USER_VALIDATION_SERVICE_URL
              value: "http://member-home:8080"
            - name: AZURE_STORAGE_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: azure-storage-connection-string
            - name: AUDIT_LOG_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: tasks-secrets
                  key: audit-log-connection-string
            - name: AUDIT_LOG_QUEUE_NAME
              value: "audit-log"
            - name: PORT
              value: "8081"
          readinessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v3/api-docs
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: tasks
spec:
  type: LoadBalancer
  selector:
    app: tasks
  ports:
    - port: 8081
      targetPort: 8081


