sonar.organization=seudea
sonar.projectKey=seudea_familiar-tasks
sonar.projectName=familiar-tasks

sonar.sources=\
  authentication/src/main/java,\
  member_home/src/main/java,\
  tasks/src/main/java,\
  logs/src/main/java

sonar.tests=\
  authentication/src/test/java,\
  member_home/src/test/java,\
  tasks/src/test/java,\
  logs/src/test/java

sonar.java.binaries=\
  authentication/target/classes,\
  member_home/target/classes,\
  tasks/target/classes,\
  logs/target/classes

sonar.java.test.binaries=\
  authentication/target/test-classes,\
  member_home/target/test-classes,\
  tasks/target/test-classes,\
  logs/target/test-classes

sonar.coverage.jacoco.xmlReportPaths=\
  authentication/target/site/jacoco/jacoco.xml,\
  member_home/target/site/jacoco/jacoco.xml,\
  tasks/target/site/jacoco/jacoco.xml,\
  logs/target/site/jacoco/jacoco.xml

sonar.sourceEncoding=UTF-8
sonar.java.source=21

# Exclusiones de cobertura: clases sin logica unitaria significativa.
# - Bootstrap de Spring (*Application.java)
# - Clases @Configuration puras (solo wiring de beans)
# - Filtros de servlet que requieren contexto (config/filter/)
# - Entidades JPA / data holders Lombok
# - Listeners de cola Azure (requieren broker real)
sonar.coverage.exclusions=\
  **/*Application.java,\
  **/AuditLogConfig.java,\
  **/BeanConfiguration.java,\
  **/RestTemplateConfig.java,\
  **/SecurityConfig.java,\
  **/SecurityConfiguration.java,\
  **/ServiceBusConfig.java,\
  **/UsersQueueConfig.java,\
  **/config/filter/**,\
  **/database/entyties/**,\
  **/database/entities/**,\
  **/persistence/entity/**,\
  **/adapter/in/queue/**,\
  **/adapter/in/LogMessageListener.java,\
  **/adapter/out/UserRegistrationMessageListener.java
