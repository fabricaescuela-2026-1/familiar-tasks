# -------------------------------------------------------
# Replace <ORG> with your SonarCloud organization key
# Replace <PROJECT_KEY> with the key you chose when
# creating the project in SonarCloud (e.g. myorg_familiar-tasks)
# -------------------------------------------------------
sonar.organization=seudea
sonar.projectKey=seudea_familiar-tasks
sonar.projectName=familiar-tasks

# Sources & tests — all three services
sonar.sources=\
  authentication/src/main/java,\
  Autheticator/src/main/java,\
  tasks/src/main/java

sonar.tests=\
  authentication/src/test/java,\
  Autheticator/src/test/java,\
  tasks/src/test/java

# Compiled bytecode (required for Java analysis)
sonar.java.binaries=\
  authentication/target/classes,\
  Autheticator/target/classes,\
  tasks/target/classes

sonar.java.test.binaries=\
  authentication/target/test-classes,\
  Autheticator/target/test-classes,\
  tasks/target/test-classes

# JaCoCo coverage reports (generated once tests run without -DskipTests)
sonar.coverage.jacoco.xmlReportPaths=\
  authentication/target/site/jacoco/jacoco.xml,\
  Autheticator/target/site/jacoco/jacoco.xml,\
  tasks/target/site/jacoco/jacoco.xml

sonar.sourceEncoding=UTF-8
sonar.java.source=21
